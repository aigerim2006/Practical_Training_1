{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 bg-[#090a10]/60 relative">
    <div class="absolute top-1/4 left-1/3 w-72 h-72 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/3 w-72 h-72 bg-emerald-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-md w-full bg-[#11131e]/80 backdrop-blur-2xl p-8 rounded-[2.5rem] border border-white/10 relative overflow-hidden shadow-[0_25px_50px_-12px_rgba(0,0,0,0.7)] group hover:border-white/15 transition-all duration-500">
        <div class="absolute top-0 left-10 right-10 h-[1px] bg-gradient-to-r from-transparent via-purple-500/40 to-transparent"></div>
        
        <div class="mb-8 relative z-10">
            <span class="px-3 py-1 bg-purple-500/10 border border-purple-500/20 text-purple-400 text-[10px] font-black uppercase tracking-widest rounded-full">Модификация</span>
            <h3 class="text-3xl font-black text-white tracking-tight mt-3">Редактирование</h3>
            <p class="text-xs text-white/40 font-medium mt-1">Изменение замера от <span class="text-purple-400 font-semibold">{{ progress.date|date:"d.m.Y" }}</span></p>
        </div>

        <form method="post" class="space-y-6 relative z-10">
            {% csrf_token %}
            {% for field in form %}
            <div class="space-y-2">
                <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest pl-1">{{ field.label }}</label>
                <div class="relative w-full 
                    [&_input]:w-full [&_input]:bg-white/[0.03] [&_input]:border [&_input]:border-white/10 [&_input]:rounded-2xl [&_input]:px-4 [&_input]:py-3.5 [&_input]:text-sm [&_input]:text-white [&_input]:placeholder-white/20 [&_input]:transition-all [&_input]:duration-300
                    [&_input:focus]:bg-white/[0.07] [&_input:focus]:border-purple-500 [&_input:focus]:ring-4 [&_input:focus]:ring-purple-500/10 [&_input:focus]:outline-none
                    [&_textarea]:w-full [&_textarea]:bg-white/[0.03] [&_textarea]:border [&_textarea]:border-white/10 [&_textarea]:rounded-2xl [&_textarea]:px-4 [&_textarea]:py-3.5 [&_textarea]:text-sm [&_textarea]:text-white [&_textarea]:placeholder-white/20 [&_textarea]:transition-all [&_textarea]:duration-300 [&_textarea]:h-24
                    [&_textarea:focus]:bg-white/[0.07] [&_textarea:focus]:border-purple-500 [&_textarea:focus]:ring-4 [&_textarea:focus]:ring-purple-500/10 [&_textarea:focus]:outline-none">
                    {{ field }}
                </div>
                {% if field.errors %}
                <p class="text-xs text-rose-400/90 font-medium pl-1 flex items-center gap-1">
                    <span class="w-1 h-1 rounded-full bg-rose-400"></span> {{ field.errors.as_text }}
                </p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="flex gap-4 pt-4">
                <a href="{% url 'analytics:progress_log' %}" class="w-1/2 py-3.5 bg-white/[0.02] hover:bg-white/[0.06] text-white/60 hover:text-white font-bold rounded-2xl border border-white/5 hover:border-white/10 transition-all duration-300 text-xs uppercase tracking-widest text-center block">
                    Отмена
                </a>
                <button type="submit" class="w-1/2 py-3.5 bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 hover:opacity-90 active:scale-95 text-white font-bold rounded-2xl shadow-lg shadow-emerald-950/40 transition-all duration-300 text-xs uppercase tracking-widest">
                    Обновить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
