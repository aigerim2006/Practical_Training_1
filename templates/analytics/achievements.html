{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-10">
        <h2 class="text-4xl font-black text-white tracking-tight">Достижения</h2>
        <p class="text-slate-400 mt-2">Ваши личные рекорды и пройденный путь.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white/5 border border-white/10 p-6 rounded-3xl hover:bg-white/10 transition-all">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 rounded-2xl bg-indigo-500/20 flex items-center justify-center text-2xl">🔥</div>
                <div>
                    <h3 class="font-bold text-white">Первая тренировка</h3>
                    <p class="text-xs text-white/50">Выполнен 01.06.2026</p>
                </div>
            </div>
            <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                <div class="bg-indigo-500 h-full w-full"></div>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 p-6 rounded-3xl opacity-60">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 rounded-2xl bg-slate-700/50 flex items-center justify-center text-2xl">⚡</div>
                <div>
                    <h3 class="font-bold text-white">10 тренировок</h3>
                    <p class="text-xs text-white/50">В процессе...</p>
                </div>
            </div>
            <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                <div class="bg-emerald-500 h-full w-[40%]"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
