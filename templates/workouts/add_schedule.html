{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-6">Новая запись</h2>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-white/50 uppercase">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl text-white font-bold hover:shadow-lg hover:shadow-indigo-500/30 transition-all">
                Сохранить в расписание
            </button>
            <a href="{% url 'workouts:schedule' %}" class="block text-center text-sm text-white/40 hover:text-white transition">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
