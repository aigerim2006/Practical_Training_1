{% extends 'base.html' %}
{% block content %}
<div class="max-w-5xl mx-auto py-12 px-4">
    <div class="mb-10">
        <a href="{% url 'workouts:workout_list' %}" class="inline-flex items-center gap-2 text-sm font-bold text-white/40 hover:text-indigo-400 transition mb-4">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Вернуться к списку
        </a>
        <h2 class="text-4xl font-black text-white tracking-tight">Регистрация активности</h2>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div class="bg-white/5 backdrop-blur-xl p-8 rounded-3xl border border-white/10">
            <h3 class="text-xs font-black text-white/30 uppercase tracking-widest mb-6">Базовые параметры</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                {% for field in form %}
                <div>
                    <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-2">{{ field.label }}</label>
                    <div class="w-full bg-black/20 border border-white/5 rounded-xl focus-within:border-indigo-500/50 transition-all">
                        {{ field }}
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="bg-white/5 backdrop-blur-xl p-8 rounded-3xl border border-white/10">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-xs font-black text-white/30 uppercase tracking-widest">Список упражнений</h3>
                <button type="button" id="btnAddRow" class="text-[10px] font-bold bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl transition uppercase tracking-widest shadow-lg shadow-indigo-600/20">
                    + Добавить упражнение
                </button>
            </div>
            
            <div id="exerciseRows" class="space-y-3">
                <div class="grid grid-cols-12 gap-3 exercise-row group bg-black/20 p-4 rounded-2xl border border-white/5">
                    <div class="col-span-12 md:col-span-6">
                        <input type="text" name="ex_name[]" placeholder="Название упражнения" class="w-full bg-transparent outline-none text-sm text-white placeholder:text-white/20 px-2">
                    </div>
                    <div class="col-span-4 md:col-span-2">
                        <input type="number" name="ex_sets[]" placeholder="Сеты" class="w-full bg-transparent outline-none text-sm text-white placeholder:text-white/20 text-center">
                    </div>
                    <div class="col-span-4 md:col-span-2">
                        <input type="number" name="ex_reps[]" placeholder="Повторы" class="w-full bg-transparent outline-none text-sm text-white placeholder:text-white/20 text-center">
                    </div>
                    <div class="col-span-3 md:col-span-1">
                        <input type="number" step="0.5" name="ex_weight[]" placeholder="Вес" class="w-full bg-transparent outline-none text-sm text-white placeholder:text-white/20 text-center">
                    </div>
                    <div class="col-span-1 flex justify-center items-center">
                        <button type="button" onclick="removeRow(this)" class="text-white/20 hover:text-rose-400 transition">✕</button>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-black rounded-2xl shadow-xl shadow-indigo-600/20 transition-all uppercase tracking-widest text-sm">
            Сохранить тренировку
        </button>
    </form>
</div>

<script>
function removeRow(btn) {
    const row = btn.closest('.exercise-row');
    if (document.querySelectorAll('.exercise-row').length > 1) {
        row.style.opacity = '0';
        setTimeout(() => row.remove(), 200);
    }
}

document.getElementById('btnAddRow').addEventListener('click', function() {
    const container = document.getElementById('exerciseRows');
    const newRow = container.querySelector('.exercise-row').cloneNode(true);
    newRow.querySelectorAll('input').forEach(input => input.value = '');
    newRow.style.opacity = '0';
    container.appendChild(newRow);
    requestAnimationFrame(() => {
        newRow.style.transition = 'all 0.3s ease';
        newRow.style.opacity = '1';
    });
});
</script>

<style>
    /* Стиль для инпутов внутри формы, чтобы они не имели белого фона */
    input[type="text"], input[type="number"], input[type="date"], select {
        width: 100%;
        background: transparent !important;
        border: none !important;
        color: white !important;
        padding: 0.75rem 1rem !important;
    }
    input:focus { outline: none !important; }
</style>
{% endblock %}
