{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl text-center">
        <div class="w-16 h-16 bg-rose-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <h2 class="text-xl font-bold text-white mb-2">Удалить тренировку?</h2>
        <p class="text-white/50 mb-8">Вы уверены, что хотите удалить «{{ schedule.exercise_name }}» из расписания? Это действие нельзя отменить.</p>
        
        <form method="post" class="flex gap-3">
            {% csrf_token %}
            <a href="{% url 'workouts:schedule' %}" class="flex-1 py-3 bg-white/5 rounded-xl text-white hover:bg-white/10 transition">Отмена</a>
            <button type="submit" class="flex-1 py-3 bg-rose-500 hover:bg-rose-600 rounded-xl text-white font-bold transition">Удалить</button>
        </form>
    </div>
</div>
{% endblock %}
