{% extends 'fitness/base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md border border-gray-100">
    <h2 class="text-2xl font-bold text-center text-gray-900 mb-2">Создать аккаунт</h2>
    <p class="text-xs text-gray-400 text-center mb-6">Ввод базовых физических параметров по ТЗ 4.1</p>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {% if form.errors %}
            <div class="p-3 bg-red-50 text-red-600 text-sm rounded border border-red-200">
                {% for field, errors in form.errors.items %}{{ errors|striptags }}{% endfor %}
            </div>
        {% endif %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                <input type="{% if 'password' in field.name %}password{% elif 'weight' in field.name %}number{% else %}text{% endif %}" {% if 'weight' in field.name %}step="0.1"{% endif %} name="{{ field.html_name }}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md font-semibold hover:bg-indigo-700 transition">Зарегистрироваться</button>
    </form>
</div>
{% endblock %}
