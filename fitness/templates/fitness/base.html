<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фитнес-трекер КГТУ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-xl font-bold tracking-wide">💪 FITNESS.TRACKER</a>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-sm bg-indigo-700 px-3 py-1 rounded-full">👤 {{ user.username }}</span>
                    <a href="{% url 'dashboard' %}" class="hover:underline">Панель</a>
                    <a href="{% url 'add_workout' %}" class="hover:underline">Новая тренировка</a>
                    <a href="{% url 'logout' %}" class="text-red-200 hover:text-white hover:underline">Выйти</a>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:underline">Вход</a>
                    <a href="{% url 'register' %}" class="bg-white text-indigo-600 px-4 py-1.5 rounded font-semibold hover:bg-gray-100">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-xs text-gray-400 mt-20 pb-6">
        КГТУ им. И. Раззакова • Кафедра ПОКС • Учебная практика 2026
    </footer>
</body>
</html>
