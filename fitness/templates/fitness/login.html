{% extends 'fitness/base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md border border-gray-100 mt-12">
    <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Авторизация системы</h2>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md font-semibold hover:bg-indigo-700 transition">Войти в личный кабинет</button>
    </form>
    <p class="text-sm text-center text-gray-500 mt-4">Нет аккаунта? <a href="{% url 'register' %}" class="text-indigo-600 hover:underline">Зарегистрироваться</a></p>
</div>
{% endblock %}
