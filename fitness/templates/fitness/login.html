{% extends 'fitness/base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100 mt-10">
    <div class="text-center border-b border-slate-100 pb-5 mb-6">
        <h2 class="text-2xl font-black text-slate-900">Авторизация</h2>
        <p class="text-xs text-slate-400 mt-1">Вход в систему учета физической активности</p>
    </div>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Имя пользователя</label>
            {{ form.username }}
        </div>
        <div>
            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Пароль</label>
            {{ form.password }}
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/20 pt-4">Войти в личный кабинет</button>
    </form>
    <p class="text-center text-xs text-slate-400 mt-6">Еще нет аккаунта? <a href="{% url 'register' %}" class="text-indigo-600 font-semibold hover:underline">Зарегистрироваться</a></p>
</div>
{% endblock %}
